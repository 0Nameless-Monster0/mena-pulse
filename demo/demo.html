/* ═══════════════════════════════════════════════════════════════════
   MENA PULSE · terminal skin
   Obsidian glassmorphism · neon-restrained accents · tabular data type
   ═══════════════════════════════════════════════════════════════════ */
:root{
  --bg0:#04060d;
  --glass:linear-gradient(180deg,rgba(17,24,39,.52),rgba(9,13,25,.42));
  --glass-hi:linear-gradient(180deg,rgba(24,28,44,.66),rgba(12,16,30,.5));
  --stroke:rgba(148,163,184,.11);
  --stroke-hover:rgba(170,186,214,.28);
  --txt:#e9eef7; --dim:#9aa7bd; --dimmer:#5f6d87; --faint:#414e66;
  --amber:#fbbf24; --amber-deep:#f59e0b;
  --bull:#34d399; --bear:#fb4d67;
  --font:Inter,system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0}
html{scrollbar-color:#2a3650 transparent}
::-webkit-scrollbar{width:8px}::-webkit-scrollbar-thumb{background:#243046;border-radius:99px}
::selection{background:rgba(251,191,36,.25);color:#fff}
body{
  color:var(--txt);font:14px/1.45 var(--font);
  letter-spacing:-0.011em;-webkit-font-smoothing:antialiased;
  background:
    radial-gradient(1100px 700px at 82% -12%, rgba(56,89,220,.16), transparent 62%),
    radial-gradient(850px 550px at -8% 108%, rgba(245,158,11,.06), transparent 58%),
    radial-gradient(700px 500px at 50% 120%, rgba(99,102,241,.07), transparent 60%),
    var(--bg0);
  background-attachment:fixed;
  min-height:100vh;
}
.mono,[class*="src"],.when,.tick,.l2,.n,.upd,.abtn{font-family:var(--mono);font-feature-settings:"tnum" 1}

/* ── header: frosted command bar ────────────────────────────────── */
header{position:sticky;top:0;z-index:20;background:rgba(4,7,15,.62);
  backdrop-filter:blur(16px) saturate(150%);-webkit-backdrop-filter:blur(16px) saturate(150%)}
header::after{content:"";display:block;height:1px;
  background:linear-gradient(90deg,transparent,rgba(251,191,36,.35) 18%,rgba(148,163,184,.18) 50%,rgba(99,102,241,.3) 82%,transparent)}
.bar{max-width:1152px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:8px 26px;padding:12px 20px}
.logo{display:flex;align-items:center;gap:9px;font-family:var(--mono);font-weight:700;font-size:13.5px;letter-spacing:.22em}
.logo .a{color:var(--amber);text-shadow:0 0 14px rgba(251,191,36,.55)}
.logo svg{color:var(--amber);filter:drop-shadow(0 0 6px rgba(251,191,36,.6))}
.pill{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.14em;padding:3px 8px;border-radius:99px;
  background:rgba(100,116,139,.16);color:var(--dim);border:1px solid rgba(148,163,184,.18)}
nav{display:flex;gap:2px;padding:3px;border-radius:12px;background:rgba(10,14,26,.6);border:1px solid var(--stroke)}
nav button{border:0;background:none;color:var(--dim);font:600 13px var(--font);letter-spacing:-0.01em;
  padding:7px 15px;border-radius:9px;cursor:pointer;transition:all .18s ease}
nav button:hover{color:var(--txt);background:rgba(148,163,184,.08)}
nav button.on{color:#0b0e18;background:linear-gradient(180deg,#fde68a,#f59e0b);
  box-shadow:0 2px 14px -2px rgba(245,158,11,.55),inset 0 1px 0 rgba(255,255,255,.5)}
.upd{margin-left:auto;display:flex;align-items:center;gap:8px;font:500 10px var(--mono);letter-spacing:.04em;color:var(--dimmer)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--bull);
  box-shadow:0 0 8px rgba(52,211,153,.9),0 0 18px rgba(52,211,153,.4);animation:pu 2.2s infinite}
@keyframes pu{0%,100%{opacity:1}50%{opacity:.3}}

.wrap{max-width:1152px;margin:0 auto;padding:20px}

/* ── horizon selector: glass segments with live counts ──────────── */
.hbar{display:flex;flex-wrap:wrap;align-items:stretch;gap:10px;margin-bottom:16px}
.hbtn{position:relative;border:1px solid var(--stroke);background:var(--glass);border-radius:14px;
  padding:10px 18px;cursor:pointer;text-align:left;color:var(--dim);min-width:158px;
  backdrop-filter:blur(10px);transition:all .22s cubic-bezier(.4,0,.2,1)}
.hbtn:hover{border-color:var(--stroke-hover);transform:translateY(-1px)}
.hbtn .l1{font:700 12.5px var(--font);letter-spacing:.01em}
.hbtn .l2{font:500 10px var(--mono);color:var(--dimmer);margin-top:3px;letter-spacing:.02em}
.hbtn.on{color:var(--amber);border-color:rgba(251,191,36,.45);
  background:linear-gradient(180deg,rgba(251,191,36,.12),rgba(245,158,11,.04));
  box-shadow:0 0 28px -8px rgba(245,158,11,.45),inset 0 1px 0 rgba(251,191,36,.18)}
.hbtn.on .l2{color:rgba(251,191,36,.75)}
.hbar .upd{align-self:center}

/* ── UAE sub-tabs ───────────────────────────────────────────────── */
.subtabs{display:inline-flex;border:1px solid var(--stroke);background:var(--glass);backdrop-filter:blur(10px);
  border-radius:12px;padding:3px;margin-bottom:16px}
.subtabs button{border:0;background:none;color:var(--dim);font:600 12px var(--font);
  padding:6px 16px;border-radius:9px;cursor:pointer;transition:all .18s ease}
.subtabs button:hover{color:var(--txt)}
.subtabs button.on{background:linear-gradient(180deg,rgba(148,163,184,.22),rgba(100,116,139,.14));color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 2px 10px -2px rgba(0,0,0,.6)}

/* ── sections ───────────────────────────────────────────────────── */
.sec{margin-bottom:30px}
.sec-h{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sec-h h2{font:700 11px var(--mono);letter-spacing:.24em;text-transform:uppercase}
.sec-h .n{font:600 10px var(--mono);padding:2px 8px;border-radius:99px}
.sec-h .rule{height:1px;flex:1}
.hi h2{color:var(--amber);text-shadow:0 0 16px rgba(251,191,36,.4)}
.hi .n{color:var(--amber);background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25)}
.hi .rule{background:linear-gradient(90deg,rgba(251,191,36,.5),rgba(251,191,36,.08) 55%,transparent)}
.hi svg{filter:drop-shadow(0 0 5px rgba(245,158,11,.7))}
.gen h2{color:var(--dimmer)}
.gen .n{color:var(--dimmer);background:rgba(100,116,139,.1);border:1px solid rgba(100,116,139,.2)}
.gen .rule{background:linear-gradient(90deg,rgba(148,163,184,.22),transparent)}

/* ── news cards: layered glass, sentiment edge, hover elevation ─── */
.card{position:relative;display:flex;align-items:flex-start;gap:14px;
  background:var(--glass);border:1px solid var(--stroke);border-radius:13px;
  padding:11px 14px 11px 17px;margin-bottom:7px;backdrop-filter:blur(9px);
  transition:transform .18s cubic-bezier(.4,0,.2,1),box-shadow .25s ease,border-color .2s ease}
.card::before{content:"";position:absolute;left:0;top:10px;bottom:10px;width:2.5px;border-radius:99px;
  background:linear-gradient(180deg,rgba(148,163,184,.28),transparent);transition:all .25s ease}
.card:hover{transform:translateY(-2px);border-color:var(--stroke-hover);
  box-shadow:0 10px 32px -14px rgba(0,0,0,.85),0 0 0 1px rgba(255,255,255,.03) inset,0 0 22px -10px rgba(148,163,184,.28)}
.card.hi-card{background:var(--glass-hi);border-color:rgba(251,191,36,.16)}
.card.hi-card::before{background:linear-gradient(180deg,var(--amber),rgba(245,158,11,.05));
  box-shadow:0 0 10px rgba(245,158,11,.5)}
.card.hi-card:hover{border-color:rgba(251,191,36,.42);
  box-shadow:0 10px 34px -14px rgba(0,0,0,.85),0 0 26px -8px rgba(245,158,11,.3)}
.card.hi-card.s-bull::before{background:linear-gradient(180deg,var(--bull),rgba(52,211,153,.05));box-shadow:0 0 10px rgba(52,211,153,.55)}
.card.hi-card.s-bull:hover{border-color:rgba(52,211,153,.4);box-shadow:0 10px 34px -14px rgba(0,0,0,.85),0 0 26px -8px rgba(52,211,153,.3)}
.card.hi-card.s-bear::before{background:linear-gradient(180deg,var(--bear),rgba(251,77,103,.05));box-shadow:0 0 10px rgba(251,77,103,.55)}
.card.hi-card.s-bear:hover{border-color:rgba(251,77,103,.4);box-shadow:0 10px 34px -14px rgba(0,0,0,.85),0 0 26px -8px rgba(251,77,103,.3)}

.meta{display:flex;align-items:center;gap:9px;margin-bottom:5px;flex-wrap:wrap}
.dir{font:700 9px var(--mono)}
.dir.up{color:var(--bull);text-shadow:0 0 8px rgba(52,211,153,.8)}
.dir.dn{color:var(--bear);text-shadow:0 0 8px rgba(251,77,103,.8)}
.when{font:500 10px var(--mono);color:var(--dimmer);letter-spacing:.03em}
.ndot{width:6px;height:6px;border-radius:50%;background:var(--bull);
  box-shadow:0 0 8px rgba(52,211,153,.9);animation:pu 1.6s infinite}

/* source badges: futuristic glass chips with signal dot */
.src{position:relative;display:inline-flex;align-items:center;gap:5px;
  font:700 9px var(--mono);letter-spacing:.13em;text-transform:uppercase;
  padding:2.5px 9px;border-radius:7px;border:1px solid;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07)}
.src::before{content:"";width:4px;height:4px;border-radius:50%;background:currentColor;
  box-shadow:0 0 6px currentColor}
.t-EGX{color:#4cc3ff;background:linear-gradient(180deg,rgba(14,165,233,.2),rgba(14,165,233,.07));border-color:rgba(56,189,248,.38)}
.t-Tadawul{color:#3ee6a8;background:linear-gradient(180deg,rgba(16,185,129,.2),rgba(16,185,129,.07));border-color:rgba(52,211,153,.38)}
.t-ADX{color:#b49aff;background:linear-gradient(180deg,rgba(139,92,246,.22),rgba(139,92,246,.08));border-color:rgba(167,139,250,.4)}
.t-DFM{color:#ff7d95;background:linear-gradient(180deg,rgba(244,63,94,.2),rgba(244,63,94,.07));border-color:rgba(251,113,133,.38)}
.t-x{color:#a9b6cc;background:linear-gradient(180deg,rgba(100,116,139,.18),rgba(100,116,139,.06));border-color:rgba(148,163,184,.3)}

/* ticker chips */
.tick{font:700 10px var(--mono);letter-spacing:.06em;color:var(--amber);
  background:linear-gradient(180deg,rgba(251,191,36,.14),rgba(245,158,11,.05));
  border:1px solid rgba(251,191,36,.3);border-radius:6px;padding:1.5px 7px;
  cursor:default;transition:all .18s ease}
.tick:hover{transform:scale(1.06);box-shadow:0 0 14px rgba(251,191,36,.4);border-color:rgba(251,191,36,.6)}

h3{font:480 13.5px/1.42 var(--font);letter-spacing:-0.008em;color:var(--txt)}
h3 b{color:#fde68a;font-weight:700;text-shadow:0 0 12px rgba(251,191,36,.35)}

/* actions */
.acts{flex-shrink:0;display:flex;gap:7px;margin-top:2px}
.abtn{display:flex;align-items:center;gap:5px;border:1px solid rgba(148,163,184,.22);
  background:rgba(15,21,36,.5);border-radius:8px;padding:5px 10px;
  font:600 10px var(--mono);letter-spacing:.03em;color:var(--dim);
  text-decoration:none;cursor:pointer;opacity:.75;transition:all .2s ease}
.card:hover .abtn{opacity:1}
.abtn:hover{border-color:rgba(251,191,36,.55);color:var(--amber);
  box-shadow:0 0 14px -4px rgba(245,158,11,.5);transform:translateY(-1px)}
.abtn.ov-on{border-color:rgba(251,191,36,.6);color:var(--amber);opacity:1;
  background:linear-gradient(180deg,rgba(251,191,36,.14),rgba(245,158,11,.05));
  box-shadow:0 0 16px -4px rgba(245,158,11,.45)}

/* analyst overview: buttery grid-rows slide */
.ovwrap{display:grid;grid-template-rows:0fr;transition:grid-template-rows .38s cubic-bezier(.33,1,.35,1)}
.ovwrap.open{grid-template-rows:1fr}
.ov{overflow:hidden;min-height:0;opacity:0;transform:translateY(-4px);
  transition:opacity .3s ease .08s,transform .34s cubic-bezier(.33,1,.35,1) .05s}
.ovwrap.open .ov{opacity:1;transform:none}
.ov-inner{margin-top:9px;border-top:1px solid transparent;
  border-image:linear-gradient(90deg,rgba(251,191,36,.4),rgba(148,163,184,.12) 60%,transparent) 1;
  padding-top:9px;font:400 12px/1.65 var(--font);color:var(--dim)}
.ov-inner .ovh{font:700 9px var(--mono);letter-spacing:.22em;color:var(--amber);
  text-transform:uppercase;margin-bottom:5px;text-shadow:0 0 10px rgba(251,191,36,.35)}
.ov-inner b{color:var(--txt);font-weight:600}

.empty{border:1px dashed rgba(148,163,184,.2);background:rgba(10,14,26,.35);
  border-radius:13px;padding:20px;text-align:center;font:500 12px var(--mono);color:var(--faint)}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
</style>
</head>

// ── overview engine (mirrors backend ranker categories) ────────────────────
function overviewFor(n){
  const h=n.headline, tk=n.tickers[0]||"the company";
  const t=re=>re.test(h);
  let b;
  if(t(/dividend/i)) b=`${tk} has announced a cash distribution to shareholders. Key checks: implied yield at the current price, payout sustainability versus earnings and free cash flow, and any signal of a policy change. Watch the follow-up disclosure for ex-date and record date.`;
  else if(t(/profit|net income|revenue|results|GMV|loss|consensus/i)) b=`Earnings event for ${tk}. Focus on the quality of the print — margins, one-offs, FX effects — and whether guidance or consensus estimates need to move. Expect sell-side estimate revisions within 24–48 hours and follow-through in the next trading session.`;
  else if(t(/acqui|stake|merger|takeover|spin-off/i)) b=`Corporate action: ${tk} is changing its asset or ownership perimeter. Assess deal multiple versus trading multiple, funding mix (cash/debt/equity), and integration or approval risk. Regulatory sign-off and financing terms are the near-term catalysts.`;
  else if(t(/rate|CBE|SAMA|CBUAE|Fed|repo|monetary/i)) b=`Macro/monetary event with direct read-through to bank margins, real-estate demand, and equity risk premia across the market. Rate-sensitive names (banks, developers, leveraged corporates) will reprice first. Watch forward guidance language for the pace of the cycle.`;
  else if(t(/capital increase|rights issue|bonus|buyback|sukuk|bond|IPO|issuance|financing|facility/i)) b=`Capital-structure event for ${tk}. Evaluate dilution or accretion mechanics, use of proceeds, and pricing versus comparable issues. For income investors, check the impact on per-share metrics and future distribution capacity.`;
  else if(t(/contract|award|PPA|concession|order|agreement|supply/i)) b=`Backlog event: ${tk} has added contracted revenue visibility. Key questions are margin profile versus the existing book, execution timeline, and counterparty quality. Translate the award into revenue phasing before adjusting estimates.`;
  else if(t(/CEO|board|chairman|appoint|transition|executive/i)) b=`Governance event at ${tk}. Leadership changes can signal strategy shifts — check for continuity of capital-allocation policy and any linked disclosures. Historically these are volatility events until the incoming mandate is clarified.`;
  else if(t(/FRA|CMA|SCA|regulat|rules|framework|approval|listing/i)) b=`Regulatory development. Map which listed names fall inside the new scope, the compliance timeline, and whether it changes the cost of capital or the listed-universe pipeline. Regulators' implementation notes usually follow within weeks.`;
  else if(t(/Moody|rating|outlook/i)) b=`Ratings action with implications for funding costs and foreign-investor eligibility thresholds. Cross-check which issuers benefit most and whether spreads have already moved. Sovereign-linked upgrades typically lift bank valuations first.`;
  else b=`Routine market-flow item — session color rather than a materiality event. Useful for gauging liquidity, breadth, and positioning, but unlikely to move single-name estimates. No model impact expected.`;
  return b+` <b>Source:</b> ${esc(n.source)} · published ${timeAgo(n.published_at)}.`;
}

function timeAgo(iso){
  const s=(Date.now()-new Date(iso))/1e3;
  if(s<60)return"just now"; if(s<3600)return Math.floor(s/60)+"m ago";
  if(s<86400)return Math.floor(s/3600)+"h ago"; return Math.floor(s/86400)+"d ago";
}
function boldTickers(h,ticks){
  let out=esc(h);
  ticks.forEach(t=>{ out=out.replace(new RegExp("\\b"+t+"\\b","g"),"<b>"+t+"</b>"); });
  return out;
}
// Bullish / bearish read on the headline drives the neon accent edge.
function sentiment(h){
  if(/rise|rises|jump|climb|beat|beating|higher|up \d|gains?|surge|record|grow|extends/i.test(h)) return "s-bull";
  if(/fall|falls|miss|missing|lower|down \d|drop|decline|loss|slips?|warning|downgrade/i.test(h)) return "s-bear";
  return "";
}
function dirGlyph(cls){
  return cls==="s-bull" ? '<span class="dir up">▲</span>'
       : cls==="s-bear" ? '<span class="dir dn">▼</span>' : "";
}
// Toggle in place — no re-render — so the slide animation always plays.
function toggleOv(id){
  const wrap=document.getElementById("ov-"+id), btn=document.getElementById("ovb-"+id);
  if(!wrap) return;
  const open=!expanded.has(id);
  open ? expanded.add(id) : expanded.delete(id);
  wrap.classList.toggle("open", open);
  btn.classList.toggle("ov-on", open);
  btn.innerHTML=ovBtnLabel(open);
}
function ovBtnLabel(open){
  return `${open?"Hide":"Overview"} <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">${open?'<path d="m18 15-6-6-6 6"/>':'<path d="m6 9 6 6 6-6"/>'}</svg>`;
}

      <div class="ovwrap ${open?"open":""}" id="ov-${n.id}">
        <div class="ov"><div class="ov-inner"><div class="ovh">Analyst overview</div>${overviewFor(n)}</div></div>
      </div>
    </div>
    <div class="acts">
      <button class="abtn ${open?"ov-on":""}" id="ovb-${n.id}" onclick="toggleOv('${n.id}')">${ovBtnLabel(open)}</button>
      <a class="abtn" href="${esc(n.url)}" target="_blank" rel="noopener">Read Source
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg></a>
    </div>
  </article>`;
}
function section(title, items, hi){
  const icon = hi
    ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4M12 17h.01"/></svg>'
    : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0V6"/><path d="M18 14h-8M15 18h-5M10 6h8v4h-8V6Z"/></svg>';
  return `<section class="sec ${hi?"hi":"gen"}">
    <div class="sec-h">${icon}<h2>${title}</h2><span class="n">${items.length}</span><div class="rule"></div></div>
    ${items.length ? items.map(card).join("") : '<p class="empty">Nothing in this window.</p>'}
  </section>`;
}
function baseItems(){
  let items = NEWS.filter(n=>n.market===state.market);
  if(state.market==="AE" && state.uaeSub!=="ALL") items = items.filter(n=>n.exchange===state.uaeSub);
  return items;
}
function render(){
  document.getElementById("tabs").innerHTML = MARKETS.map(([id,l])=>
    `<button class="${state.market===id?"on":""}" onclick="state.market='${id}';state.uaeSub='ALL';render()">${l}</button>`).join("");
  const base = baseItems();
  const inWin = w => base.filter(n=>(Date.now()-new Date(n.published_at))<=WIN_H[w]*36e5);
  document.getElementById("hbar").innerHTML = WINS.map(([id,l1,l2])=>
    `<button class="hbtn ${state.win===id?"on":""}" onclick="state.win='${id}';render()">
       <div class="l1">${l1}</div><div class="l2">${l2} · ${inWin(id).length} items</div></button>`).join("");
  document.getElementById("upd").innerHTML =
    `<span class="dot"></span> LIVE · updated ${lastUpdated.toLocaleTimeString()} · refreshes every 60s`;
  document.getElementById("subtabs").innerHTML = state.market==="AE"
    ? `<div class="subtabs">${SUBS.map(([id,l])=>
        `<button class="${state.uaeSub===id?"on":""}" onclick="state.uaeSub='${id}';render()">${l}</button>`).join("")}</div>` : "";
  const items = inWin(state.win).sort((a,b)=>new Date(b.published_at)-new Date(a.published_at));
  document.getElementById("content").innerHTML =
    section("High-Impact Material Disclosures", items.filter(n=>n.impact==="high"), true) +
    section("General Market Stream", items.filter(n=>n.impact==="general"), false);
}
render();
setInterval(()=>{ injectBreaking(); lastUpdated=new Date(); render(); }, 60_000);
</script>
</body>
</html>
